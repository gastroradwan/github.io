name: Normalize Navigation and Check Links

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inject-navigation-css.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize navigation on all HTML pages
        shell: python
        run: |
          from pathlib import Path
          import re

          links = [
              ('index.html', 'Úvod'),
              ('sluzby.html', 'Služby'),
              ('sprava-elektro-bezpecnosti.html', 'Správa elektro bezpečnosti'),
              ('garant-elektro.html', 'Garant elektro'),
              ('ezapp.html', 'EZApp'),
              ('prihlaseni.html', 'Přihlášení'),
              ('kontakt.html', 'Kontakt'),
          ]

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              current = path.name
              nav_items = []
              for href, label in links:
                  current_attr = ' aria-current="page"' if href == current else ''
                  nav_items.append(f'        <a href="{href}"{current_attr}>{label}</a>')
              nav = '<nav class="main-nav" aria-label="Hlavní navigace">\n' + '\n'.join(nav_items) + '\n      </nav>'

              new_text, count = re.subn(
                  r'<nav class="main-nav"(?:\s+aria-label="[^"]*")?>.*?</nav>',
                  nav,
                  text,
                  count=1,
                  flags=re.S,
              )
              if count == 0:
                  print(f'ERROR: {path} nemá hlavní navigaci')
                  raise SystemExit(1)

              new_text = re.sub(
                  r'<link rel="stylesheet" href="navigation\.css(?:\?v=\d+)?">',
                  '<link rel="stylesheet" href="navigation.css?v=4">',
                  new_text,
                  count=1,
              )

              if 'navigation.css?v=4' not in new_text:
                  new_text = new_text.replace('</head>', '  <link rel="stylesheet" href="navigation.css?v=4">\n</head>', 1)

              if new_text != text:
                  path.write_text(new_text, encoding='utf-8')
                  changed.append(str(path))

          print(f'Normalizováno {len(changed)} stránek')
          for item in changed:
              print(f'  - {item}')

      - name: Check internal links, anchors and local assets
        shell: python
        run: |
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit, unquote

          root = Path('.').resolve()
          html_files = sorted(Path('.').glob('*.html'))
          ids = {}
          refs = []
          errors = []

          class Parser(HTMLParser):
              def __init__(self, source):
                  super().__init__()
                  self.source = source
                  self.page_ids = set()

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if 'id' in attrs:
                      self.page_ids.add(attrs['id'])
                  for attr in ('href', 'src'):
                      value = attrs.get(attr)
                      if value:
                          refs.append((self.source, tag, attr, value.strip()))

          for path in html_files:
              parser = Parser(path)
              parser.feed(path.read_text(encoding='utf-8'))
              ids[path.name] = parser.page_ids

          ignored_schemes = ('mailto:', 'tel:', 'javascript:', 'data:')
          for source, tag, attr, value in refs:
              if not value or value.startswith(ignored_schemes):
                  continue
              if value.startswith(('http://', 'https://', '//')):
                  continue

              parsed = urlsplit(value)
              raw_path = unquote(parsed.path)
              fragment = unquote(parsed.fragment)

              if not raw_path:
                  target = source
              elif raw_path == '/':
                  target = Path('index.html')
              else:
                  target = (source.parent / raw_path).resolve()
                  try:
                      target.relative_to(root)
                  except ValueError:
                      errors.append(f'{source}: odkaz míří mimo web: {value}')
                      continue

              if raw_path and not target.exists():
                  errors.append(f'{source}: chybí cíl {value}')
                  continue

              if fragment:
                  target_name = target.name if target.suffix == '.html' else source.name
                  if target_name not in ids:
                      errors.append(f'{source}: nelze ověřit kotvu {value}')
                  elif fragment not in ids[target_name]:
                      errors.append(f'{source}: chybí kotva #{fragment} v {target_name}')

          required = {
              'index.html', 'sluzby.html', 'sprava-elektro-bezpecnosti.html',
              'garant-elektro.html', 'ezapp.html', 'prihlaseni.html', 'kontakt.html'
          }
          for page in html_files:
              text = page.read_text(encoding='utf-8')
              nav_start = text.find('<nav class="main-nav"')
              nav_end = text.find('</nav>', nav_start)
              nav_text = text[nav_start:nav_end]
              for target in required:
                  if f'href="{target}"' not in nav_text:
                      errors.append(f'{page}: horní lišta neobsahuje {target}')
              if 'navigation.css?v=4' not in text:
                  errors.append(f'{page}: nenačítá navigation.css?v=4')

          if errors:
              print('Nalezené chyby:')
              for error in errors:
                  print(f'  - {error}')
              raise SystemExit(1)

          print(f'Kontrola dokončena: {len(html_files)} HTML souborů, {len(refs)} odkazů a zdrojů bez chyby.')

      - name: Commit normalized pages
        run: |
          if git diff --quiet; then
            echo "No HTML pages required an update."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Doplněno přihlášení zákazníka do horní navigace"
          git push
