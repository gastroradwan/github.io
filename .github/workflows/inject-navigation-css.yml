name: Inject Navigation CSS

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inject-navigation-css.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Insert navigation stylesheet into all HTML pages
        shell: python
        run: |
          from pathlib import Path

          marker = '<link rel="stylesheet" href="navigation.css?v=1">'
          changed = []

          for path in sorted(Path('.').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              if marker in text:
                  continue
              if '</head>' not in text:
                  print(f'SKIP: {path} has no </head>')
                  continue

              text = text.replace('</head>', f'  {marker}\n</head>', 1)
              path.write_text(text, encoding='utf-8')
              changed.append(str(path))

          print(f'Updated {len(changed)} pages')
          for item in changed:
              print(f'  - {item}')

      - name: Commit updated pages
        run: |
          if git diff --quiet; then
            echo "No HTML pages required an update."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Zjednodušena hlavní navigace na všech stránkách"
          git push
